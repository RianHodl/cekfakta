<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CekFakta.id — Lindungi Keluarga dari Hoaks</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="Alat deteksi hoaks berbasis AI untuk keluarga Indonesia. Verifikasi pesan teks dan tangkapan layar instan.">
  
  <!-- Modern Typography (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Reset & CSS Variables */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-color: #FFFFFF;
      --text-primary: #1C1C1E;
      --text-secondary: #8E8E93;
      --border-color: #E5E5EA;
      --bg-input: #F2F2F7;
      --accent: #1C1C1E;
      --accent-hover: #2C2C2E;
      
      /* Muted Verdict Colors */
      --hoax-text: #B91C1C;
      --hoax-bg: #FEF2F2;
      --hoax-border: #FCA5A5;
      
      --fact-text: #15803D;
      --fact-bg: #F0FDF4;
      --fact-border: #BBF7D0;
      
      --unverified-text: #64748B;
      --unverified-bg: #F1F5F9;
      --unverified-border: #CBD5E1;
      
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      --transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Container & Layout */
    .container {
      width: 100%;
      max-width: 580px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      margin-top: 0;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 8px;
    }

    .wordmark {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .wordmark::after {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background-color: #B91C1C; /* Minimalist dot */
      border-radius: 50%;
    }

    .tagline {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 400;
      margin-top: 4px;
    }

    /* Unified Chat Composer Card */
    .composer-card {
      border: 1px solid var(--border-color);
      border-radius: 16px;
      background-color: #FFFFFF;
      box-shadow: var(--shadow);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: var(--transition);
    }

    .composer-card:focus-within {
      border-color: var(--text-primary);
    }

    .textarea-claim {
      border: none;
      resize: none;
      font-size: 15px;
      padding: 12px;
      outline: none;
      min-height: 120px;
      font-family: inherit;
      color: var(--text-primary);
      background-color: transparent;
      width: 100%;
    }

    .textarea-claim::placeholder {
      color: var(--text-secondary);
    }

    /* Composer Image Preview */
    .composer-preview-container {
      display: none;
      padding: 8px 12px;
    }

    .composer-preview-wrapper {
      position: relative;
      display: inline-block;
      max-width: 140px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      background-color: var(--bg-input);
    }

    .composer-preview-img {
      width: 100%;
      height: auto;
      max-height: 120px;
      object-fit: cover;
      display: block;
    }

    .composer-remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background-color: rgba(28, 28, 30, 0.8);
      color: #FFFFFF;
      border: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      transition: var(--transition);
    }

    .composer-remove-btn:hover {
      background-color: rgba(28, 28, 30, 1);
    }

    /* Composer Bottom Bar */
    .composer-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border-color);
      padding-top: 8px;
      padding-left: 4px;
      padding-right: 4px;
    }

    .btn-attach {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 8px;
      transition: var(--transition);
    }

    .btn-attach:hover {
      color: var(--text-primary);
      background-color: var(--bg-input);
    }

    .file-input {
      display: none;
    }

    .btn-check {
      background-color: var(--accent);
      color: #FFFFFF;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: var(--transition);
    }

    .btn-check:hover {
      background-color: var(--accent-hover);
    }

    /* Loading Indicator */
    .loading-container {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px 20px;
      text-align: center;
    }

    .thinking-spinner {
      position: relative;
      width: 48px;
      height: 48px;
    }

    .thinking-circle {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 3px solid transparent;
      border-top-color: var(--text-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .thinking-pulse {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
      background-color: var(--text-primary);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    }

    .loading-text {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .loading-subtext {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Result Card */
    .result-container {
      display: none;
      animation: fadeInScale 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.97);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .result-card {
      background-color: #FFFFFF;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Stamped Result Photo container */
    .result-image-container {
      display: none;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      background-color: var(--bg-input);
    }

    .result-image {
      width: 100%;
      height: auto;
      max-height: 420px;
      object-fit: contain;
      display: block;
    }

    /* Verdict Badge styling (Only shown if text-only) */
    .verdict-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 28px;
      border-radius: 9999px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border: 1px solid transparent;
      animation: scaleUpBadge 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes scaleUpBadge {
      from { transform: scale(0.8); }
      to { transform: scale(1); }
    }

    /* Verdict Modifiers */
    .verdict-hoax {
      color: var(--hoax-text);
      background-color: var(--hoax-bg);
      border-color: var(--hoax-border);
    }

    .verdict-fact {
      color: var(--fact-text);
      background-color: var(--fact-bg);
      border-color: var(--fact-border);
    }

    .verdict-unverified {
      color: var(--unverified-text);
      background-color: var(--unverified-bg);
      border-color: var(--unverified-border);
    }

    /* Klaim & Realitas blocks */
    .block-container {
      width: 100%;
      text-align: left;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid var(--border-color);
    }

    .block-klaim {
      background-color: #FAF9F6; /* warm beige tint */
      border-left: 4px solid var(--text-secondary);
    }

    .block-realitas {
      background-color: #FFFFFF;
      border-left: 4px solid #1C1C1E;
    }

    .block-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .block-text {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* Result Actions Row */
    .button-row {
      display: flex;
      gap: 12px;
      width: 100%;
      margin-top: 8px;
    }

    .btn-action-half {
      flex: 1;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 14px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: var(--transition);
      border: none;
    }

    .btn-download-half {
      background-color: var(--accent);
      color: #FFFFFF;
    }

    .btn-download-half:hover {
      background-color: var(--accent-hover);
    }

    .btn-share-half {
      background-color: #25D366; /* WhatsApp Green */
      color: #FFFFFF;
    }

    .btn-share-half:hover {
      background-color: #128C7E;
    }

    .btn-reset {
      background-color: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      transition: var(--transition);
      width: 100%;
      margin-top: 4px;
    }

    .btn-reset:hover {
      color: var(--text-primary);
      border-color: var(--text-primary);
      background-color: var(--bg-input);
    }

    /* Error Message Overlay */
    .error-banner {
      display: none;
      background-color: #FEF2F2;
      border: 1px solid var(--hoax-border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--hoax-text);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    /* Hidden Canvas for downloads */
    #hiddenCanvas {
      display: none;
    }

    /* Responsive adjustments */
    @media (max-width: 480px) {
      body {
        padding: 16px 12px;
      }
      .container {
        gap: 20px;
      }
      .result-card {
        padding: 24px 16px;
      }
      .wordmark {
        font-size: 24px;
      }
      .button-row {
        flex-direction: column;
        gap: 8px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header -->
    <header>
      <div class="wordmark">CekFakta.id</div>
      <div class="tagline">Lindungi Keluargamu dari Hoaks</div>
    </header>

    <!-- Error Banner -->
    <div class="error-banner" id="errorBanner"></div>

    <!-- Main Analyzer Area -->
    <main id="mainApp">
      <!-- Composer Form -->
      <div class="composer-card" id="composerForm" dragzone>
        <textarea class="textarea-claim" id="claimText" placeholder="Ketik atau tempel teks berita, pesan WhatsApp, atau informasi mencurigakan di sini..."></textarea>
        
        <!-- Attached Image Preview (Inside Composer) -->
        <div class="composer-preview-container" id="composerPreviewContainer">
          <div class="composer-preview-wrapper">
            <img src="" alt="Preview Lampiran" class="composer-preview-img" id="composerPreviewImage">
            <button class="composer-remove-btn" id="composerRemovePreview" title="Hapus foto">×</button>
          </div>
        </div>

        <!-- Footer actions of composer -->
        <div class="composer-footer">
          <button class="btn-attach" id="btnAttach" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            Lampirkan Foto
          </button>
          <input type="file" class="file-input" id="fileInput" accept="image/*">
          
          <button class="btn-check" id="btnCheck">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            Periksa Sekarang
          </button>
        </div>
      </div>

      <!-- Loading State -->
      <div class="loading-container" id="loadingState">
        <div class="thinking-spinner">
          <div class="thinking-circle"></div>
          <div class="thinking-pulse"></div>
        </div>
        <div>
          <div class="loading-text">Sedang menganalisis konten...</div>
          <div class="loading-subtext">Memverifikasi klaim dan mengevaluasi kebenarannya</div>
        </div>
      </div>

      <!-- Result Card -->
      <div class="result-container" id="resultContainer">
        <div class="result-card">
          <!-- 1. Stamped Image Preview (Visible directly if image uploaded) -->
          <div class="result-image-container" id="resultImageContainer">
            <img id="resultImage" class="result-image" src="" alt="Hasil Verifikasi Gambar">
          </div>

          <!-- 2. Verdict Badge Pill (Visible only if text-only) -->
          <div class="verdict-badge" id="verdictBadge">HOAX</div>

          <!-- 3. Klaim Block -->
          <div class="block-container block-klaim">
            <div class="block-title">Klaim</div>
            <div class="block-text" id="klaimText"></div>
          </div>

          <!-- 4. Realitas Block -->
          <div class="block-container block-realitas">
            <div class="block-title">Realitas</div>
            <div class="block-text" id="realitasText"></div>
          </div>

          <!-- 5. Actions row (side by side) + Check Again -->
          <div style="width: 100%;">
            <div class="button-row">
              <button class="btn-action-half btn-download-half" id="btnDownload">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="7 10 12 15 17 10"></polyline>
                  <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Unduh Gambar
              </button>
              <button class="btn-action-half btn-share-half" id="btnShare">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                Bagikan
              </button>
            </div>
            <button class="btn-reset" id="btnCheckAgain">Cek Konten Baru</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Hidden Canvas for Stamping and Card Output -->
  <canvas id="hiddenCanvas"></canvas>

  <script>
    // Constants & Global State
    const GEMINI_API_KEY = 'AIzaSyAyIjHcdZ-HY39W9MeiCoxlwo3UtIgmiqI';
    let uploadedImageBlob = null;
    let finalVerdictData = null; // Storing final JSON verdict from API

    // DOM Elements
    const errorBanner = document.getElementById('errorBanner');
    
    const composerForm = document.getElementById('composerForm');
    const claimText = document.getElementById('claimText');
    const btnAttach = document.getElementById('btnAttach');
    const fileInput = document.getElementById('fileInput');
    const composerPreviewContainer = document.getElementById('composerPreviewContainer');
    const composerPreviewImage = document.getElementById('composerPreviewImage');
    const composerRemovePreview = document.getElementById('composerRemovePreview');
    const btnCheck = document.getElementById('btnCheck');
    
    const loadingState = document.getElementById('loadingState');
    
    const resultContainer = document.getElementById('resultContainer');
    const resultImageContainer = document.getElementById('resultImageContainer');
    const resultImage = document.getElementById('resultImage');
    const verdictBadge = document.getElementById('verdictBadge');
    const klaimText = document.getElementById('klaimText');
    const realitasText = document.getElementById('realitasText');
    
    const btnDownload = document.getElementById('btnDownload');
    const btnShare = document.getElementById('btnShare');
    const btnCheckAgain = document.getElementById('btnCheckAgain');
    const hiddenCanvas = document.getElementById('hiddenCanvas');

    // Event Listeners
    // Paste image from clipboard (Ctrl+V)
    document.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const file = item.getAsFile();
          if (file) handleFiles([file]);
          break;
        }
      }
    });

    // Trigger Attach File Picker
    btnAttach.addEventListener('click', () => {
      fileInput.click();
    });

    // File Input change
    fileInput.addEventListener('change', (e) => {
      handleFiles(e.target.files);
    });

    // Drag-and-Drop Event Listeners on the whole composer card
    ['dragenter', 'dragover'].forEach(eventName => {
      composerForm.addEventListener(eventName, (e) => {
        e.preventDefault();
        e.stopPropagation();
        composerForm.style.borderColor = 'var(--text-primary)';
      }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      composerForm.addEventListener(eventName, (e) => {
        e.preventDefault();
        e.stopPropagation();
        composerForm.style.borderColor = 'var(--border-color)';
      }, false);
    });

    composerForm.addEventListener('drop', (e) => {
      const dt = e.dataTransfer;
      const files = dt.files;
      handleFiles(files);
    });

    // Remove Preview
    composerRemovePreview.addEventListener('click', () => {
      uploadedImageBlob = null;
      fileInput.value = '';
      composerPreviewImage.src = '';
      composerPreviewContainer.style.display = 'none';
    });

    // Main Check Action
    btnCheck.addEventListener('click', performAnalysis);

    // Reset Flow
    btnCheckAgain.addEventListener('click', resetForm);

    // Canvas Download
    btnDownload.addEventListener('click', () => {
      if (!finalVerdictData) return;
      const filename = uploadedImageBlob ? 'cekfakta-verdict.png' : 'cekfakta-verdict-card.png';
      triggerCanvasDownload(filename);
    });

    // Share to WhatsApp
    btnShare.addEventListener('click', () => {
      if (!finalVerdictData) return;
      const verdict = finalVerdictData.verdict.toUpperCase();
      const klaim = finalVerdictData.klaim;
      const realitas = finalVerdictData.realitas;

      const shareText = `*Hasil Verifikasi CekFakta.id: ${verdict}*\n\n*KLAIM:*\n"${klaim}"\n\n*REALITAS:*\n${realitas}\n\nPeriksa kebenaran informasi lainnya di https://CekFakta.id`;
      window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`, '_blank');
    });

    // Helper Functions
    function showError(msg) {
      if (msg) {
        errorBanner.textContent = msg;
        errorBanner.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        errorBanner.style.display = 'none';
        errorBanner.textContent = '';
      }
    }

    function handleFiles(files) {
      if (files.length === 0) return;
      const file = files[0];
      if (!file.type.startsWith('image/')) {
        showError('Maaf, hanya dapat melampirkan file gambar.');
        return;
      }
      showError('');
      uploadedImageBlob = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        composerPreviewImage.src = e.target.result;
        composerPreviewContainer.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    // Convert Blob to Base64 (Promise)
    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    // Gemini API Request
    async function performAnalysis() {
      // Validation
      if (GEMINI_API_KEY === 'YOUR_API_KEY_HERE' || !GEMINI_API_KEY) {
        showError('Konfigurasi API Key tidak valid. Harap masukkan kunci API di dalam file index.html.');
        return;
      }

      const text = claimText.value.trim();
      if (!text && !uploadedImageBlob) {
        showError('Harap tuliskan teks klaim atau lampirkan foto terlebih dahulu.');
        return;
      }

      showError('');
      // Enter loading state
      composerForm.style.display = 'none';
      loadingState.style.display = 'flex';

      try {
        const parts = [];

        // Build precise system/instruction prompt (Indonesian Verdict and Response)
        const instructionText = `You are a professional fact-checking assistant specialized in analyzing misinformation, especially on Indonesian social media. 
Assess the truthfulness of the provided content.
You MUST respond with a valid JSON block in Bahasa Indonesia containing exactly the following schema:
{
  "verdict": "HOAKS" | "FAKTA" | "TIDAK PASTI",
  "klaim": "Ringkasan satu kalimat mengenai klaim utama yang diajukan oleh konten.",
  "realitas": "Penjelasan faktual sanggahan klaim tersebut dalam Bahasa Indonesia (2 hingga 3 kalimat)."
}

Rules:
1. Verdict MUST be exactly one of: HOAKS, FAKTA, or TIDAK PASTI.
2. Both "klaim" and "realitas" MUST be written in clear, plain Bahasa Indonesia.
3. You MUST ONLY suggest from the following list of trusted independent sources when analyzing: AFP Fact Check, Reuters Fact Check, Snopes, FactCheck.org, Full Fact, and TEMPE.co.
4. Suggest TEMPE.co ONLY when the content appears satirical.
5. NEVER suggest or mention any government-affiliated sources (e.g. Kominfo, government sites).
6. If the content originates from a visible credible news outlet (e.g. Kumparan, Kompas, CNN Indonesia, BBC, Reuters, or any recognized media logo visible in the image), do NOT verdict as HOAKS unless the claim is clearly and provably false. Use TIDAK PASTI if the specific claim cannot be fully confirmed.
7. Output ONLY the JSON block. Do not wrap in markdown quotes except standard JSON or output anything other than this JSON.`;

        parts.push({ text: instructionText });

        if (text) {
          parts.push({ text: `Analyze the following claim/text content: "${text}"` });
        }

        if (uploadedImageBlob) {
          const base64DataUrl = await blobToBase64(uploadedImageBlob);
          const base64Clean = base64DataUrl.split(',')[1];
          parts.push({
            inlineData: {
              mimeType: uploadedImageBlob.type,
              data: base64Clean
            }
          });
        }

        // Call Gemini v1beta model
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        
        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            contents: [{ parts: parts }],
            generationConfig: {
              responseMimeType: "application/json",
              responseSchema: {
                type: "OBJECT",
                properties: {
                  verdict: {
                    type: "STRING",
                    enum: ["HOAKS", "FAKTA", "TIDAK PASTI"]
                  },
                  klaim: {
                    type: "STRING"
                  },
                  realitas: {
                    type: "STRING"
                  }
                },
                required: ["verdict", "klaim", "realitas"]
              }
            }
          })
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          const errMsg = errData.error?.message || `HTTP error ${response.status}`;
          throw new Error(errMsg);
        }

        const resData = await response.json();
        const responseText = resData.candidates?.[0]?.content?.parts?.[0]?.text;
        
        if (!responseText) {
          throw new Error('Gemini API did not return text content.');
        }

        // Clean & Parse response
        let cleanedJson = responseText.trim();
        if (cleanedJson.startsWith('```')) {
          cleanedJson = cleanedJson.replace(/^```(?:json)?/, '').replace(/```$/, '').trim();
        }

        const verdictResult = JSON.parse(cleanedJson);
        
        // Assert schema keys
        if (!verdictResult.verdict || !verdictResult.klaim || !verdictResult.realitas) {
          throw new Error('Response JSON is missing required fields.');
        }

        // Keep local copy of results
        finalVerdictData = verdictResult;

        // Render Results
        renderResult(verdictResult);

      } catch (err) {
        console.error(err);
        let pesanError = 'Analisis gagal. Silakan coba beberapa saat lagi.';
        if (err.message.includes('high demand') || err.message.includes('overloaded')) {
          pesanError = 'Server sedang sibuk. Silakan coba lagi dalam beberapa menit.';
        } else if (err.message.includes('API key') || err.message.includes('403')) {
          pesanError = 'API Key tidak valid. Pastikan kunci API sudah benar.';
        } else if (err.message.includes('network') || err.message.includes('fetch')) {
          pesanError = 'Koneksi internet bermasalah. Periksa koneksi kamu dan coba lagi.';
        }
        showError(pesanError);
        loadingState.style.display = 'none';
        composerForm.style.display = 'flex';
      }
    }

    function renderResult(data) {
      const verdict = data.verdict.toUpperCase();
      
      // Populate text blocks
      klaimText.textContent = data.klaim;
      realitasText.textContent = data.realitas;

      // Handle UI logic depending on image availability
      if (uploadedImageBlob) {
        // Draw the verdict stamped directly onto the photo
        generateStampedImage(() => {
          // Display the result container
          loadingState.style.display = 'none';
          resultContainer.style.display = 'block';
        });
      } else {
        // Hide image preview in result card
        resultImageContainer.style.display = 'none';

        // Render separate verdict badge pill
        verdictBadge.textContent = verdict;
        verdictBadge.style.display = 'inline-flex';
        verdictBadge.className = 'verdict-badge'; // reset
        
        if (verdict === 'HOAKS') {
          verdictBadge.classList.add('verdict-hoax');
        } else if (verdict === 'FAKTA') {
          verdictBadge.classList.add('verdict-fact');
        } else {
          verdictBadge.classList.add('verdict-unverified');
        }

        // Render text card on the hidden canvas for download action
        generateStandaloneCard();

        // Display results
        loadingState.style.display = 'none';
        resultContainer.style.display = 'block';
      }
    }

    function resetForm() {
      // Reset inputs
      claimText.value = '';
      uploadedImageBlob = null;
      fileInput.value = '';
      composerPreviewImage.src = '';
      composerPreviewContainer.style.display = 'none';
      
      // Clear data states
      finalVerdictData = null;
      showError('');

      // Show form, hide results
      resultContainer.style.display = 'none';
      composerForm.style.display = 'flex';
    }

    // Wrap text for Canvas Context
    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      const words = text.split(' ');
      let line = '';
      let currentY = y;
      
      for (let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + ' ';
        let metrics = ctx.measureText(testLine);
        let testWidth = metrics.width;
        if (testWidth > maxWidth && n > 0) {
          ctx.fillText(line, x, currentY);
          line = words[n] + ' ';
          currentY += lineHeight;
        } else {
          line = testLine;
        }
      }
      ctx.fillText(line, x, currentY);
      return currentY + lineHeight;
    }

    // Stamping logic for photo submissions
    function generateStampedImage(callback) {
      if (!finalVerdictData) return;

      const verdict = finalVerdictData.verdict.toUpperCase();
      let verdictColor = '#64748B'; // TIDAK PASTI
      let verdictBg = '#F1F5F9';
      if (verdict === 'HOAKS') {
        verdictColor = '#B91C1C';
        verdictBg = '#FEF2F2';
      } else if (verdict === 'FAKTA') {
        verdictColor = '#15803D';
        verdictBg = '#F0FDF4';
      }

      const img = new Image();
      img.src = composerPreviewImage.src;
      img.onload = () => {
        const w = img.width;
        const h = img.height;
        
        // Calculate proportional banner size
        const bannerHeight = Math.max(120, Math.round(h * 0.15));
        
        hiddenCanvas.width = w;
        hiddenCanvas.height = h + bannerHeight;
        
        const ctx = hiddenCanvas.getContext('2d');
        
        // Draw original image
        ctx.drawImage(img, 0, 0, w, h);
        
        // Draw Banner area at bottom
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, h, w, bannerHeight);
        
        // Draw separation line
        ctx.strokeStyle = '#E5E5EA';
        ctx.lineWidth = Math.max(2, Math.round(bannerHeight * 0.015));
        ctx.beginPath();
        ctx.moveTo(0, h);
        ctx.lineTo(w, h);
        ctx.stroke();

        // Text padding relative to banner height
        const paddingX = Math.round(bannerHeight * 0.25);
        const centerY = h + (bannerHeight / 2);

        // Draw CekFakta.id wordmark on the left
        ctx.fillStyle = '#1C1C1E';
        ctx.textBaseline = 'middle';
        
        const titleSize = Math.max(16, Math.round(bannerHeight * 0.22));
        ctx.font = `bold ${titleSize}px 'Inter', sans-serif`;
        ctx.fillText('CekFakta.id', paddingX, centerY - (bannerHeight * 0.08));
        
        // Dot on CekFakta
        const dotRadius = Math.max(2, Math.round(titleSize * 0.1));
        const textMetric = ctx.measureText('CekFakta.id');
        ctx.fillStyle = '#B91C1C';
        ctx.beginPath();
        ctx.arc(paddingX + textMetric.width + (dotRadius * 2), centerY - (bannerHeight * 0.08), dotRadius, 0, Math.PI * 2);
        ctx.fill();

        // Tagline below wordmark
        ctx.fillStyle = '#8E8E93';
        const subtitleSize = Math.max(11, Math.round(bannerHeight * 0.12));
        ctx.font = `${subtitleSize}px 'Inter', sans-serif`;
        ctx.fillText('Lindungi Keluargamu dari Hoaks', paddingX, centerY + (bannerHeight * 0.16));

        // Draw Verdict Badge centered on the photo like a watermark
        const pillText = verdict;
        const badgeFontHeight = Math.max(26, Math.round(w * 0.07));
        ctx.font = `bold ${badgeFontHeight}px 'Inter', sans-serif`;
        
        const textWidth = ctx.measureText(pillText).width;
        const pillPaddingX = Math.round(badgeFontHeight * 1.5);
        const pillPaddingY = Math.round(badgeFontHeight * 0.6);
        const pillWidth = textWidth + (pillPaddingX * 2);
        const pillHeight = badgeFontHeight + (pillPaddingY * 2);
        
        const pillX = (w / 2) - (pillWidth / 2);
        const pillY = (h / 2) - (pillHeight / 2);

        // 1. Draw semi-transparent white backing box slightly larger than the pill
        const backingPadding = Math.round(badgeFontHeight * 0.3);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
        ctx.beginPath();
        ctx.roundRect(
          pillX - backingPadding,
          pillY - backingPadding,
          pillWidth + (backingPadding * 2),
          pillHeight + (backingPadding * 2),
          Math.round((pillHeight + backingPadding * 2) / 2)
        );
        ctx.fill();

        // 2. Draw colored Verdict Pill on top
        ctx.fillStyle = verdictBg;
        ctx.beginPath();
        ctx.roundRect(pillX, pillY, pillWidth, pillHeight, Math.round(pillHeight / 2));
        ctx.fill();
        
        // Draw Pill Border
        ctx.strokeStyle = (verdict === 'HOAKS') ? '#FCA5A5' : (verdict === 'FAKTA' ? '#BBF7D0' : '#CBD5E1');
        ctx.lineWidth = Math.max(2, Math.round(badgeFontHeight * 0.08));
        ctx.stroke();

        // Draw Pill Text
        ctx.fillStyle = verdictColor;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(pillText, w / 2, h / 2);

        // Output to result element
        resultImage.src = hiddenCanvas.toDataURL('image/png');
        resultImageContainer.style.display = 'block';
        verdictBadge.style.display = 'none';

        if (callback) callback();
      };
    }

    // Standalone Verdict Card (Text-only)
    function generateStandaloneCard() {
      if (!finalVerdictData) return;

      const verdict = finalVerdictData.verdict.toUpperCase();
      const klaim = finalVerdictData.klaim;
      const realitas = finalVerdictData.realitas;

      // Styles based on verdict
      let verdictColor = '#64748B'; // TIDAK PASTI
      let verdictBg = '#F1F5F9';
      if (verdict === 'HOAKS') {
        verdictColor = '#B91C1C';
        verdictBg = '#FEF2F2';
      } else if (verdict === 'FAKTA') {
        verdictColor = '#15803D';
        verdictBg = '#F0FDF4';
      }

      const size = 800;
      hiddenCanvas.width = size;
      hiddenCanvas.height = size;
      
      const ctx = hiddenCanvas.getContext('2d');
      
      // Background
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, size, size);
      
      // Card Border
      ctx.strokeStyle = '#E5E5EA';
      ctx.lineWidth = 12;
      ctx.strokeRect(6, 6, size - 12, size - 12);
      
      // Header
      ctx.fillStyle = '#1C1C1E';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.font = `bold 32px 'Inter', sans-serif`;
      ctx.fillText('CekFakta.id', 60, 60);

      // Dot
      ctx.fillStyle = '#B91C1C';
      ctx.beginPath();
      const textMetric = ctx.measureText('CekFakta.id');
      ctx.arc(60 + textMetric.width + 8, 80, 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#8E8E93';
      ctx.font = `400 16px 'Inter', sans-serif`;
      ctx.fillText('Lindungi Keluargamu dari Hoaks', 60, 105);

      // Divider
      ctx.strokeStyle = '#E5E5EA';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(60, 145);
      ctx.lineTo(size - 60, 145);
      ctx.stroke();

      // Verdict pill positioning
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      
      const badgeFontHeight = 22;
      ctx.font = `bold ${badgeFontHeight}px 'Inter', sans-serif`;
      const textWidth = ctx.measureText(verdict).width;
      
      const pillPaddingX = 32;
      const pillPaddingY = 12;
      const pillWidth = textWidth + (pillPaddingX * 2);
      const pillHeight = badgeFontHeight + (pillPaddingY * 2);
      const pillX = (size / 2) - (pillWidth / 2);
      const pillY = 190;

      // Draw Rounded Rect for Pill
      ctx.fillStyle = verdictBg;
      ctx.beginPath();
      ctx.roundRect(pillX, pillY, pillWidth, pillHeight, pillHeight / 2);
      ctx.fill();

      // Pill border
      ctx.strokeStyle = (verdict === 'HOAKS') ? '#FCA5A5' : (verdict === 'FAKTA' ? '#BBF7D0' : '#CBD5E1');
      ctx.lineWidth = 2;
      ctx.stroke();

      // Text
      ctx.fillStyle = verdictColor;
      ctx.fillText(verdict, size / 2, pillY + (pillHeight / 2));

      // Klaim Header
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillStyle = '#8E8E93';
      ctx.font = `bold 14px 'Inter', sans-serif`;
      ctx.fillText('KLAIM', 60, 290);

      // Klaim text
      ctx.fillStyle = '#1C1C1E';
      ctx.font = `500 20px 'Inter', sans-serif`;
      
      // Wrap claim text (max-width = size - 120px)
      const nextY = wrapText(ctx, `"${klaim}"`, 60, 320, size - 120, 32);

      // Realitas Header
      ctx.fillStyle = '#8E8E93';
      ctx.font = `bold 14px 'Inter', sans-serif`;
      ctx.fillText('REALITAS', 60, nextY + 30);

      // Realitas text
      ctx.fillStyle = '#1C1C1E';
      ctx.font = `500 20px 'Inter', sans-serif`;
      
      // Wrap realitas text
      const finalY = wrapText(ctx, realitas, 60, nextY + 60, size - 120, 32);

      // Card footer stamp
      ctx.fillStyle = '#AEAEB2';
      ctx.font = `400 13px 'Inter', sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('Diverifikasi oleh CekFakta.id • Lakukan pengecekan mandiri sebelum menyebarkan informasi', size / 2, size - 60);
    }

    function triggerCanvasDownload(filename) {
      const dataUrl = hiddenCanvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.download = filename;
      link.href = dataUrl;
      link.click();
    }
  </script>
